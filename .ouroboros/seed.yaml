acceptance_criteria:
  - description: >-
      브라우저 프로필의 첫 게임 시작 전에 이미지와 설명문으로 구성된 튜토리얼을
      자동 표시하고, HUD의 `?` 버튼으로 언제든 다시 열 수 있다. 튜토리얼은
      키보드 이동·발사, 하단 드래그·pointerup 발사, 하트·무적·공 증가·레이저를
      이미지 3장 이상과 한국어 본문으로 설명하며 docs/tutorial.md에도 같은 내용을
      제공한다. 열려 있는 동안 시뮬레이션·게임 타이머를 정지하고 입력을 해제하며,
      닫은 뒤 새 입력만 받는다. `?` 버튼은 키보드로 활성화되고 접근 가능한 이름
      `튜토리얼`을 가지며 모든 설명 이미지에 대체 텍스트가 있다. 튜토리얼 저장
      키가 없거나 값이 1이 아니거나 읽기 예외가 발생하면 안내를 표시하고, 쓰기
      예외가 발생하면 현재 탭 메모리에서만 완료 상태를 유지한다. 좌우 화살표 또는
      A/D로 이동하고 Space의 새 keydown으로 발사한다. 포인터는 하단 조작 영역에서
      시작한 첫 pointer만 캡처해 좌표를 clamp하고 pointerup으로 발사하며, 추가
      pointer는 무시하고 pointercancel·lostpointercapture는 발사 없이 초기화한다.
