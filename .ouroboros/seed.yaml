goal: "모바일 중심의 5스테이지 스와이프 벽돌깨기 웹게임을 완성한다."
task_type: code
brownfield_context:
  project_type: greenfield
  context_references: []
  existing_patterns: []
  existing_dependencies: []
constraints:
  - "기존 하트·적 공격형 벽돌깨기 명세와 구현은 폐기한다."
  - "Swipe-JS(https://github.com/paulkim3151/Swipe-JS)의 최소 구현선을 참고한다: 하단 스와이프 조준, pointerup 발사, 벽돌 내구도와 하강."
  - "SyphonArch/brick_breaker의 volley·멀티볼·첫 공 착지 위치 계승 규칙을 참고한다."
  - "Google Play Swipe Brick Breaker의 벽돌 하강과 바닥 도달 게임오버 흐름을 참고한다."
  - "현재 프로젝트의 TypeScript·Vite·PixiJS 의존성만 재사용하고 참고 코드·라이선스는 복제하지 않는다."
  - "작은 화면에서도 게임판·패들·공·아이템·발사 영역이 잘리지 않는 반응형 UI를 구현한다."
acceptance_criteria:
  - description: "하단 포인터 드래그로 조준선을 표시하고 pointerup 또는 touchend에서 1~8개 공 volley를 발사한다."
    semantic_ac_key: ac_5087c2052b58c48f
    verify_command: "npm test -- --run"
  - description: "공이 벽과 벽돌에 충돌하고 벽돌 내구도가 감소하며 volley 종료 후 벽돌이 한 줄 하강한다. 벽돌이 바닥에 닿으면 게임오버다."
    semantic_ac_key: ac_023c1d7216b2f94d
    verify_command: "npm test -- --run"
  - description: "모든 벽돌 제거 시 다음 스테이지로 이동하고 5번째 스테이지 완료 시 승리·결과 화면을 표시한다."
    semantic_ac_key: ac_5d4b36a4e4e9d06b
    verify_command: "npm test -- --run"
  - description: "폭탄은 주변 3x3 벽돌에 1회 피해, 멀티볼은 다음 volley 공 수를 최대 8개까지 증가, 쉴드는 바닥 손실 1회를 막고 소모된다."
    semantic_ac_key: ac_f56457967b328aa1
    verify_command: "npm test -- --run"
  - description: "데스크톱·모바일 브라우저에서 조작·게임오버·승리 흐름을 확인하고 작은 viewport에서 잘림과 문서 스크롤이 없다."
    semantic_ac_key: ac_f09bec7285021f1b
  - description: "프로덕션 빌드와 핵심 게임 규칙 자동 테스트가 정상 완료된다."
    semantic_ac_key: ac_f9274bd0d2c5649e
    verify_command: "npm test -- --run && npm run build"
    expected_artifacts:
      - dist
