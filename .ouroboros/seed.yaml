      blockLayout·obstaclePattern·enemyType·enemyMovement와 attackEventKinds가
      stage_blueprints와 일치하는 5개 스테이지를 순서대로 플레이한다. 인접 스테이지는
      블록 점유 셀 대칭차 20%, type이 다른 장애물과 type을 제외한 trace 20%, 적
      이동 trace 10%, 서로 다른 공격 event 집합의 정량 기준을 만족한다. 4·5
      스테이지는 각각 delayedDive와 curveDive를 포함해 후반 변칙 행동을 제공한다.
    semantic_ac_key: ac_c59bf9cfe54effaf
    verify_command: npm run verify:ac -- ac_c59bf9cfe54effaf
    expected_artifacts:
      - tests/stages-combat.test.ts
      - .verification-output/evidence/stages
    output_assertion: 자동 테스트와 연결된 5개 스테이지 완주·차별화 체크리스트·증빙 검증의 종료 코드 0

  - description: >-
      공은 블록·적에게 피해 후 반사되고 장애물에는 무해하게 반사되며, 레이저는
      블록·적의 첫 충돌 또는 장애물 차단 시 관통 없이 소멸한다. 모든 블록 파괴 시
      적이 남아 있어도 클리어하고 같은 tick의 치명적 피해·마지막 공 유실보다
      클리어를 우선한다. 하트 3개로 시작하며 마지막 공 유실 또는 네 피해원이 같은
      tick에 여러 번 발생해도 하트를 최대 1개 차감한다. 하트가 남으면 적·블록을
      유지하고 중앙 패들·공 1개로 2초 면제 후 자동 발사하며, 하트 0이면 즉시
      gameOver가 된다.
    semantic_ac_key: ac_0d3a0de75da951ec
    verify_command: npm run verify:ac -- ac_0d3a0de75da951ec
    expected_artifacts:
      - tests/damage-life-cycle.test.ts
      - tests/collision-clear-priority.test.ts
      - .verification-output/evidence/combat
      - .verification-output/evidence/damage
    output_assertion: 충돌·클리어 우선순위·하트 차감·회복·gameOver 검증의 종료 코드 0

  - description: >-
      블록은 seed RNG 기본 12% 확률과 동일 가중치로 하트·무적·공 증가·레이저를
      드롭하고 패들 접촉에서 한 번만 획득한다. 하트는 다른 효과를 바꾸지 않고 최대
      5개, 무적은 8초 동안 네 피해원만 막고 다른 효과와 독립이다. 공 증가와
      레이저는 서로 교체되며 새 종류는 1단계·12초, 동종 재획득은 최대 3단계와
      12초 리셋을 적용한다. 공 증가 만료 시 공 하나만 남기고 레이저 만료 시 자동
      발사를 중단한다. 생명 손실 시 공격 아이템은 해제하되 남은 무적 시간은 회복
      중에도 감소하고, 스테이지 전환 시 모든 시간제 효과를 해제한다.
    semantic_ac_key: ac_12160888720808e2
    verify_command: npm run verify:ac -- ac_12160888720808e2
    expected_artifacts:
      - tests/items.test.ts
      - .verification-output/evidence/items
    output_assertion: 드롭·획득·최대 하트·무적·공 증가·레이저의 교체·중첩·만료 검증의 종료 코드 0

  - description: >-
      스테이지 시간은 첫 공 발사부터 마지막 블록 파괴까지 측정하고 2초 회복
      대기는 포함하되 튜토리얼·전환 시간은 제외한다. 총점은 블록 점수, 적 처치
      점수, 각 스테이지의 floor(max(0, 목표 초×60-클리어 tick)×배율/60)을
      합산하고 안전 정수 상한에서 포화시킨다.
      최고 점수는 유효한 localStorage 값에서 복원하고 현재 점수가 초과할 때
      갱신한다. 키 없음·빈 값·음수·소수·비숫자·안전 정수 초과는 0으로 복구하며,
      읽기·쓰기 예외에서는 현재 탭 메모리 최고 점수로 계속한다. 게임 오버 화면에는 현재·최고 점수와 재시작을, 5스테이지 완료
      화면에는 최종·최고 점수, 총 플레이 시간, 스테이지별 시간, 적 처치 보너스
      합계, 시간 보너스 합계, 재시작을 표시한다.
    semantic_ac_key: ac_a55f3dd6516724cc
    verify_command: npm run verify:ac -- ac_a55f3dd6516724cc
    expected_artifacts:
      - tests/scoring-time-storage.test.ts
      - .verification-output/evidence/scoring
      - .verification-output/evidence/results
    output_assertion: 결과 화면·점수 정수성·모든 잘못된 저장값·읽기·쓰기 예외와 메모리 fallback 검증의 종료 코드 0

  - description: >-
      스테이지 전환 시 누적 점수와 현재 하트만 유지하고 아이템·잔여 적·탄환·드롭·
      공·레이저·입력을 초기화한다. 전환 중 시뮬레이션, 점수, 스테이지 시간,
      생성·쿨다운을 정지하고 이전 입력을 해제한 뒤 새 Space 또는 새 드래그 후
      pointerup에서 다음 스테이지와 공을 동시에 시작한다. 하트가 0이면 게임
      오버가 되며 게임 오버 또는 5스테이지 완료 후 재시작은 스테이지 1, 점수 0,
      하트 3, 아이템 없음으로 시작하고 유효한 최고 점수만 유지한다.
    semantic_ac_key: ac_7fd6b13d07d999f4
    verify_command: npm run verify:ac -- ac_7fd6b13d07d999f4
    expected_artifacts:
      - tests/transitions-endings.test.ts
      - .verification-output/evidence/transitions
      - .verification-output/evidence/final
    output_assertion: 전환·게임 오버·완료 재시작 테스트와 연결 체크리스트·증빙 검증의 종료 코드 0

ontology_schema:
  name: BrickBreakerGameRun
  description: 5스테이지 게임 런의 사용자 가시 상태와 검증 계약
  fields:
    - {name: gameStatus, type: string, required: true, description: tutorial|ready|playing|recovery|transition|gameOver|complete}
    - {name: tutorialState, type: object, required: true, description: localStorage 완료 상태·자동 표시·도움말 버튼·열림·이미지·문서·접근성·일시정지 상태}
    - {name: layoutState, type: object, required: true, description: orientation·720×960 gameBoard·160px controlArea·viewport·rendered 크기·aspectRatioError·centerOffset·clippingCount·documentScrollPx}
    - {name: simulationClock, type: object, required: true, description: 60Hz tick·정지 여부·stage elapsed time}
    - {name: stageNumber, type: number, required: true, description: 1~5}
    - {name: stageConfiguration, type: object, required: true, description: blockLayout·obstaclePattern·enemyType·enemyMovement·attackEventKinds·balance 값}
    - {name: score, type: number, required: true, description: 현재 런의 0 이상 안전 정수 누적 점수}
    - {name: highScoreRecord, type: object, required: true, description: v1 저장 키·값·memoryFallback 상태}
    - {name: hearts, type: number, required: true, description: 0~5}
    - {name: paddle, type: object, required: true, description: 위치·이동·부착 공 상태}
    - {name: balls, type: array, required: true, description: 활성 공의 위치·속도·상태}
    - {name: blocks, type: array, required: true, description: 블록의 위치·체력·파괴 상태}
    - {name: obstacles, type: array, required: true, description: 파괴 불가 장애물의 위치·접촉 상태}
    - {name: enemies, type: array, required: true, description: 적의 체력·movement·attack 상태}
    - {name: projectiles, type: array, required: true, description: 적 총알과 패들 레이저 상태}
    - {name: itemDrops, type: array, required: true, description: invincibility|heart|multiball|laser 드롭 위치·획득 상태}
    - {name: itemEffects, type: object, required: true, description: 무적·공 증가·레이저의 단계·종료 tick}
    - {name: rngState, type: object, required: true, description: 아이템 드롭·적 행동에 쓰는 직렬화 가능한 seed RNG 상태}
    - {name: eventQueue, type: array, required: true, description: 한 tick의 충돌·획득·점수·생명 손실·전환 이벤트와 적용 순서}
    - {name: damageState, type: object, required: true, description: DamageSource enemyBullet|enemyDive|enemyBody|hazardObstacle·lastBallLost·병합 tick·면제 종료 tick}
    - {name: inputState, type: object, required: true, description: 키보드·activePointerId·pointer capture·clamped drag·cancel·fresh launch 상태}
    - {name: stageClearTicks, type: array, required: true, description: 완료한 스테이지별 60Hz 기준 0 이상 정수 tick}
    - {name: stageTimes, type: array, required: true, description: stageClearTicks를 60으로 나눈 표시용 초}
    - {name: scoreBreakdown, type: object, required: true, description: 블록·적 처치·시간 보너스 합계}
    - {name: finalStatistics, type: object, required: false, nullableUntil: gameStatus=complete, finalRequiredWhen: gameStatus=complete, description: 최종·최고 점수·총 시간·스테이지별 시간·보너스 합계}
    - {name: transitionState, type: object, required: true, description: 정지·정리·새 입력 대기 상태}
    - {name: evidenceChecklist, type: "array<EvidenceChecklistRow>", required: true, description: 필수 수동 검증 행}
    - {name: approvalRecord, type: ApprovalRecord, required: false, nullableUntil: finalApproval, finalRequiredWhen: exitCondition=finalApproval, description: 기획 책임자 최종 승인}
    - {name: targetManifest, type: TargetManifest, required: false, nullableUntil: buildManifestComplete, finalRequiredWhen: verificationStarted, description: 검증 대상 식별자}
  definitions:
    EvidenceChecklistRow:
      type: object
      fields:
        testId: {type: string, required: true, format: "^[A-Z]+(?:-[A-Z]+)*-[0-9]{2}$"}
        environmentAndExactVersion: {type: EnvironmentDescriptor, required: true}
        orientation: {type: string, required: true, enum: [portrait, landscape]}
        precondition: {type: string, required: true, minLength: 1}
        steps: {type: "array<string>", required: true, minItems: 1}
        expected: {type: string, required: true, minLength: 1}
        actual: {type: string, required: true, nullableUntilExecution: true}
        verdict: {type: string, required: true, enum: [pass, fail], nullableUntilExecution: true}
        evidencePath: {type: string, required: true, prefix: .verification-output/evidence/, nullableUntilExecution: true}
        verifier: {type: string, required: true, minLength: 1, nullableUntilExecution: true}
        verifiedAt: {type: string, required: true, format: RFC3339, minimum: "2026-07-21T00:00:00+09:00", mustBeOnOrAfter: targetManifest.generatedAt, nullableUntilExecution: true}
        seedVersion: {type: string, required: true, format: semver}
        buildId: {type: string, required: true, format: "^[0-9a-f]{64}$"}
        commitSha: {type: string, required: true, format: "^[0-9a-f]{40}$"}
        approvalRecordPath: {type: string, required: true, const: .verification-output/approval.json, nullableUntilExecution: true}
      final_validation: actual·verdict·evidencePath·verifier·verifiedAt·approvalRecordPath는 null일 수 없다.
    EnvironmentDescriptor:
      type: object
      fields:
        osName: {type: string, required: true, enum: [macOS, iOS, Android]}
        osVersion: {type: string, required: true, format: "^[0-9]+(?:\\.[0-9]+){1,2}$"}
        browserName: {type: string, required: true, enum: [Chrome, Safari]}
        browserVersion: {type: string, required: true, format: "^[0-9]+(?:\\.[0-9]+){1,3}$"}
        deviceModel: {type: string, required: true, minLength: 1}
      allowed_pairs: [macOS+Chrome, iOS+Safari, Android+Chrome]
    ApprovalRecord:
      type: object
      fields:
        approverId: {type: string, required: true, minLength: 1}
        approverRole: {type: string, required: true, const: productOwner}
        approvedAt: {type: string, required: true, format: RFC3339}
        seedVersion: {type: string, required: true, format: semver}
        buildId: {type: string, required: true, format: "^[0-9a-f]{64}$"}
        commitSha: {type: string, required: true, format: "^[0-9a-f]{40}$"}
        verdict: {type: string, required: true, const: pass}
        evidenceRoot: {type: string, required: true, const: .verification-output/evidence/}
    TargetManifest:
      type: object
      fields:
        seedId: {type: string, required: true, minLength: 1}
        seedVersion: {type: string, required: true, format: semver}
        commitSha: {type: string, required: true, format: "^[0-9a-f]{40}$"}
        buildId: {type: string, required: true, format: "^[0-9a-f]{64}$"}
        generatedAt: {type: string, required: true, format: RFC3339}

verification_contract:
  common_expected_artifacts:
    - docs/acceptance-checklist.md
    - .verification-output/target-manifest.json
    - .verification-output/acceptance-results.json
    - .verification-output/approval.json
    - tests/runtime-pause.test.ts
    - tests/verification-idempotency.test.ts
    - verification/approvers.json
  execution_safety:
    verification_worktree: >-
      repoKey는 원본 repo realpath UTF-8 바이트 SHA-256의 앞 16자리다. 승인 대상
      commitSha를 ${TMPDIR}/breakout-verify-<repoKey>-<commitSha>의 detached Git
      Worktree로 checkout하고 그 경로에서만 최종 검증을 실행한다. 소유 marker는
      Worktree 밖 ${HOME}/.ouroboros/verification-worktrees/<repoKey>/<commitSha>.json에
      repo realpath·worktree realpath·commitSha·seedVersion을 기록한다. 경로가 이미
      있으면 marker 네 값, git rev-parse HEAD, clean tracked 상태가 모두 일치할 때만
      재사용하고 .verification-output/.tmp/<runId>만 제거한다.
      하나라도 다르면 기존 경로를 삭제·변경하지 않고 실패해 새 경로 선택을 요구한다.
      marker는 Worktree 밖이므로 상태 검사 대상이 아니다. 시작 직후 ignored
      .verification-output을 제외한 git status --porcelain --untracked-files=all이
      비어 있어야 하며 사용자 구현 Worktree는 변경하지 않는다.
      중단 시 Worktree와 marker를 남겨 같은 runId로 재개한다.
    atomic_outputs: >-
      runId는 <commitSha>-<seedVersion>이다. dist는 같은 파일시스템의
      dist.tmp-<runId>에 완전히 빌드한 뒤 기존 ignored dist를 제거하고 rename한다.
      manifest와 acceptance-results JSON은 .verification-output/.tmp/<runId>/에
      완전히 쓰고 close한 뒤 최종 경로로 rename한다. 시작 시 해당 runId의 임시
      경로만 제거한다. 중단 시 최종 경로에는 이전 완성본 또는 파일 없음만 남고
      부분 파일은 노출하지 않는다. 같은 commitSha·seedVersion 재실행은 같은
      buildId와 필수 행 집합을 만들며 안전하게 덮어쓴다. 승인자가 작성한
      approval.json과 evidence 파일은 자동 삭제·덮어쓰지 않는다.
    durable_archive: >-
      ${HOME}/.ouroboros/verification-archive/<repoKey>/<commitSha>/<buildId>/를
      원본 repo 밖 영구 보존 경로로 사용한다. 검증 시작 시 같은 archive가 있으면 evidence와
      approval.json만 검증 Worktree로 반입한다. 성공 시 .verification-output 전체를
      ${HOME}/.ouroboros/verification-archive/<repoKey>/.tmp/<runId>/에 복사·검증한 뒤 최종 archive 경로로
      rename하고, archive 완성을 확인한 뒤에만 임시 Worktree를 제거한다. 중단 시
      Worktree를 유지하며 archive의 기존 완성본과 원본 repo는 변경하지 않는다.
  automated:
    phases:
      prepare:
        command: npm run verify:prepare
        steps:
          - npm run validate:config
          - npm run test -- --run
          - npm run verify:determinism
          - npm run typecheck
          - npm run build
          - npm run build:manifest
        success: 종료 코드 0과 target manifest 생성
      manual_gate:
        input: prepare가 만든 commitSha·seedVersion·buildId
        action: 필수 test matrix를 실행하고 evidence·acceptance-results·approval을 작성한다.
        completion: 모든 필수 행 pass와 유효한 productOwner 승인
      finalize:
        command: npm run verify:finalize
        steps:
          - 현재 HEAD·Seed metadata·dist buildId를 target manifest와 재대조
          - npm run verify:evidence
        success: 종료 코드 0과 durable archive 완료
      command_alias: npm run verify는 manifest가 없으면 prepare만 실행해 manual_gate 필요 상태를 출력하고 종료 코드 2를 반환하며, manifest와 수동 산출물이 모두 있으면 finalize를 실행한다.
    per_acceptance_command: >-
      npm run verify:ac -- <semantic_ac_key>는 해당 자동 테스트와 그 기준에 연결된
      전용 expected_artifacts 및 공통 expected_artifacts의 존재·식별자·pass 상태를
      함께 검사한다.
    timeout_seconds_per_step: 300
    deterministic_check: >-
      네트워크를 사용하지 않고 동일 random seed, 초기 상태, 입력 이벤트와 1000개
      고정 tick을 두 번 실행해 직렬화한 최종 상태가 같아야 한다. 테스트 전체는
      선언 순서와 역순 두 번 실행해 결과가 같아야 한다.
    stage_difference_check: >-
      verify:ac은 인접 스테이지를 동일 seed로 첫 적 생성부터 600 tick 실행한다.
      매 tick 장애물과 적을 stable spawnOrder 오름차순으로 정렬하고 같은 index끼리
      대응시킨다. 한쪽에만 있는 index의 차이는 1이다. 분모 D는 600 tick 각각의
      max(양쪽 개체 수, 1)을 모두 더한 값이다. blockLayout 차이율은 두 스테이지의
      점유 셀 대칭차 크기/max(점유 셀 합집합 크기, 1)이며 0.20 이상이어야 한다.
      obstaclePattern type enum은 인접 스테이지끼리 다른지 별도 boolean으로 검사한다.
      장애물 trace는 type을 제외하고 open·active 중 하나가 다르거나
      sqrt(((xA-xB)/720)^2+((yA-yB)/960)^2)가 0.05 이상이면 차이 1, 아니면
      0이며 전체 차이 합/D가 0.20 이상이어야 한다. 적 쌍은 누락 시
      거리 1, 존재 시 min(1, sqrt((xA-xB)^2+(yA-yB)^2)/720)로 계산하고 전체
      거리 합/D가 0.10 이상이어야 한다. attackEventKinds는 stage_blueprints의
      집합과 실제 600 tick event kind 집합이 정확히 같고 인접 스테이지끼리 달라야 한다.
    target_manifest:
      path: .verification-output/target-manifest.json
      generation: >-
        npm run build 뒤 npm run build:manifest가 Node.js 표준 crypto만 사용해 만든다.
        seedId와 seedVersion은 현재 Seed metadata에서, commitSha는 git rev-parse HEAD의
        40자리 lowercase hex에서 읽는다. LP(x)는 uint64 big-endian 바이트 길이와
        x 바이트의 결합이다. dist 파일은 상대 경로 UTF-8 바이트의 사전순으로 정렬한다.
        buildId 입력은 LP(seedVersion UTF-8) || LP(commitSha UTF-8) ||
        uint64be(fileCount) || 각 파일의 LP(relativePath UTF-8) || LP(fileBytes)를
        순서대로 결합한 값이며, 그 SHA-256 lowercase 64자리를 buildId로 사용한다.
        manifest는 seedId, seedVersion, commitSha, buildId, generatedAt을 가진다.
        .verification-output/ 전체는 .gitignore에 포함한 비추적 생성 경로이며
        checklist의 실제 결과와 승인 기록도 각각 acceptance-results.json과
        approval.json에 저장한다. docs/acceptance-checklist.md는 추적되는 절차
        템플릿만 포함하고 실행 결과·SHA를 기록하지 않는다.
      validation: >-
        verify:evidence는 .verification-output/이 .gitignore에 없거나
        git status --porcelain --untracked-files=all이 비어 있지 않으면 fail이다. 현재
        .ouroboros/seed.yaml의 metadata.seed_id·version과 실제 git rev-parse HEAD를
        직접 읽어 manifest의 seedId·seedVersion·commitSha와 각각 비교하고 dist에서
        buildId를 다시 계산한다. manifest가 없거나 필드 형식·현재 값·재계산 값이
        다르거나 증빙 행의 seedVersion·commitSha·buildId가 manifest와 하나라도
        다르면 fail이다.
  manual:
    environments:
      - desktop Chrome stable keyboard and mouse
      - real iPhone Safari stable touch
      - real Android Chrome stable touch
    groups:
      - 튜토리얼과 접근성
      - 키보드·마우스·터치 입력
      - 반응형 레이아웃
      - 5스테이지 완주와 차별화
      - 네 피해원·마지막 공 유실·아이템 무적·2초 회복 면제
      - 아이템 중첩·교체·피격 해제
      - 점수·시간·최고 점수
      - 전환·게임 오버·완료·재시작
    environment_aliases:
      desktop: desktop Chrome stable
      iphone: real iPhone Safari stable
      android: real Android Chrome stable
    environment_validation: >-
      alias를 실제 EvidenceChecklistRow로 확장할 때 EnvironmentDescriptor를 사용한다.
      desktop은 macOS+Chrome, iphone은 iOS+Safari, android는 Android+Chrome 조합만
      허용한다. OS·브라우저 버전은 숫자 점 표기와 실제 기기 모델을 필수로 하며
      verifiedAt은 2026-07-21T00:00:00+09:00 이상이고 targetManifest.generatedAt과
      같거나 이후여야 한다. 시간 비교는 RFC3339를 UTC instant로 변환해 수행한다.
    primary_orientations:
      desktop: landscape
      iphone: portrait
      android: portrait
    required_test_matrix:
      - {group: 튜토리얼과 접근성, testIds: [TUT-01, TUT-02], environments: [desktop, iphone, android], orientations: [portrait, landscape]}
      - {group: 키보드·마우스·터치 입력, testIds: [CTL-KB-01, CTL-MOUSE-01], environments: [desktop], orientations: [landscape]}
      - {group: 키보드·마우스·터치 입력, testIds: [CTL-TOUCH-01], environments: [iphone, android], orientations: [portrait, landscape]}
      - {group: 반응형 레이아웃, testIds: [LAY-01], environments: [desktop, iphone, android], orientations: [portrait, landscape]}
      - {group: 5스테이지 완주와 차별화, testIds: [STG-01], environments: [desktop, iphone, android], orientations: [primary]}
      - {group: 네 피해원·마지막 공 유실·아이템 무적·2초 회복 면제, testIds: [DMG-01, DMG-INV-01], environments: [desktop, iphone, android], orientations: [primary]}
      - {group: 아이템 중첩·교체·피격 해제, testIds: [ITM-01], environments: [desktop, iphone, android], orientations: [primary]}
      - {group: 점수·시간·최고 점수, testIds: [SCR-01], environments: [desktop, iphone, android], orientations: [primary]}
      - {group: 전환·게임 오버·완료·재시작, testIds: [END-01], environments: [desktop, iphone, android], orientations: [primary]}
    test_definitions:
      TUT-01:
        precondition: brickBreaker.tutorialSeen.v1 키가 없고 게임이 시작 전 상태다.
        steps: ["게임을 로드한다.", "자동 튜토리얼의 이미지·본문·대체 텍스트를 확인한다.", "튜토리얼을 닫는다."]
        expected: 최초 튜토리얼이 자동 표시되고 진행 시간이 정지하며 닫은 뒤 완료값 1이 저장된다.
      TUT-02:
        precondition: brickBreaker.tutorialSeen.v1 값이 1이고 HUD가 표시된 상태다.
        steps: ["게임을 로드해 자동 표시가 없음을 확인한다.", "키보드 또는 탭으로 튜토리얼 ? 버튼을 활성화한다.", "튜토리얼을 닫는다."]
        expected: 자동 표시는 없고 ? 버튼으로 안내가 열리며 닫은 뒤 새 입력만 처리한다.
      CTL-KB-01:
        precondition: 데스크톱 환경의 ready 상태에서 공이 패들에 붙어 있다.
        steps: ["좌우 화살표와 A/D로 각각 이동한다.", "Space keydown으로 발사한다.", "키를 누른 채 visibility를 전환한 뒤 복귀한다."]
        expected: 두 키 조합이 패들을 이동하고 새 Space만 발사하며 복귀 전 held 입력은 재사용하지 않는다.
      CTL-MOUSE-01:
        precondition: 데스크톱 환경의 ready 상태이며 조작 영역이 표시돼 있다.
        steps: ["조작 영역에서 마우스 드래그한다.", "영역 밖까지 이동해 pointerup한다.", "pointercancel을 별도로 발생시킨다."]
        expected: 좌표가 경계로 clamp되고 캡처된 pointerup은 발사하며 pointercancel은 발사 없이 초기화한다.
      CTL-TOUCH-01:
        precondition: 터치 환경의 ready 상태이며 조작 영역이 표시돼 있다.
        steps: ["첫 손가락으로 드래그한다.", "두 번째 손가락을 추가한다.", "첫 손가락을 뗀 뒤 pointercancel도 별도로 시험한다."]
        expected: 첫 pointer만 패들을 움직이고 추가 터치는 무시되며 첫 pointerup만 발사하고 cancel은 발사하지 않는다.
      LAY-01:
        precondition: 지정 환경에서 게임이 로드되고 해당 orientation으로 회전 또는 크기 조정됐다.
        steps: ["viewport와 컨테이너·게임판 rect를 측정한다.", "조작 영역이 패들 아래인지 확인한다.", "clipping과 document scroll을 측정한다."]
        expected: 게임판 비율 오차 0.5% 이하, 중심 오차 1 CSS px 이하이며 viewport 초과·잘림·문서 스크롤이 0이다.
      STG-01:
        precondition: 새 게임의 스테이지 1에서 seed를 고정한 상태다.
        steps: ["스테이지 1부터 5까지 모든 블록을 파괴한다.", "각 인접 스테이지의 블록·장애물·적 trace를 기록한다.", "마지막 완료 화면까지 진행한다."]
        expected: 5개 스테이지가 순서대로 완료되고 stage_blueprints와 모든 정량 차별화 임계값을 만족한다.
      DMG-01:
        precondition: 하트 3, 무적 없음, 공 1개인 playing 상태다.
        steps: ["네 DamageSource와 lastBallLost를 각각 발생시킨다.", "같은 tick 복수 사건도 발생시킨다.", "하트 1 이상과 0인 경우를 확인한다."]
        expected: tick당 하트 최대 1개가 감소하고 하트가 남으면 2초 recovery 후 자동 발사하며 0이면 즉시 gameOver다.
      DMG-INV-01:
        precondition: 아이템 무적이 활성화되고 하트가 3인 playing 상태다.
        steps: ["무적 중 네 DamageSource에 각각 접촉한다.", "무적 종료 후 한 DamageSource에 접촉한다.", "2초 recovery 중 다시 접촉한다."]
        expected: 무적 중 손실이 없고 종료 후 하트 1개만 감소하며 recovery 중 추가 손실이 없다.
      ITM-01:
        precondition: 하트 3, 아이템 효과 없음, 고정 RNG seed의 playing 상태다.
        steps: ["네 아이템을 각각 획득한다.", "공 증가와 레이저를 교차·동종 재획득한다.", "만료·생명 손실·스테이지 전환을 발생시킨다."]
        expected: 드롭·최대 하트·무적 독립·공/레이저 교체·단계·시간 리셋·만료·해제가 규칙과 일치한다.
      SCR-01:
        precondition: 최고 점수 키를 정상·잘못된 값·예외 저장소로 교체 가능한 상태다.
        steps: ["tick 기반 시간 보너스를 계산한다.", "모든 잘못된 저장값과 읽기·쓰기 예외를 주입한다.", "게임 오버와 완료 화면을 연다."]
        expected: 점수는 안전 정수이고 잘못된 값은 0, 예외는 메모리 fallback이며 결과 화면의 모든 통계가 일치한다.
      END-01:
        precondition: 점수·하트·아이템·잔여 객체가 존재하는 스테이지 종료 직전 상태다.
        steps: ["블록을 모두 파괴해 전환한다.", "새 Space와 새 drag+pointerup을 각각 시험한다.", "게임 오버·5스테이지 완료 뒤 재시작한다."]
        expected: 전환은 점수·하트만 유지하고 지정 입력만 시작하며 재시작은 스테이지 1·점수 0·하트 3·아이템 없음이다.
    matrix_rule: >-
      environments와 orientations 배열의 데카르트 곱이 필수 행이다. primary는
      primary_orientations의 환경별 값으로 치환한다. verify:evidence는 생성된 모든
      testId·환경·orientation 조합이 정확히 한 개의 pass 행으로 존재하는지 검사하고
      각 행의 precondition·steps·expected가 test_definitions와 정확히 일치하는지도
      검사하며 누락·중복·불일치·fail을 거부한다.
    required_row_fields:
      - testId
      - environmentAndExactVersion
      - precondition
      - steps
      - expected
      - actual
      - verdict
      - evidencePath
      - verifier
      - verifiedAt
      - seedVersion
      - buildId
      - commitSha
      - approvalRecordPath
      - orientation
    evidence_rule: >-
      입력·피해·아이템·스테이지 흐름은 영상, 점수·초기화·결과 화면은 스크린샷,
      시간·저장·동시 프레임 우선순위는 자동 테스트 결과를 연결한다. 파일이 없거나
      열리지 않거나 testId·환경·실행 시점을 식별할 수 없으면 fail이다. seedVersion,
      buildId, commitSha 중 현재 검증 대상과 하나라도 다르면 이전 증빙은 fail이다.
      모든 행의 actual이 expected와 일치하고 verdict가 pass여야 한다.
    approval_rule: >-
      .verification-output/approval.json에 승인자, 승인 시각, seedVersion, buildId,
      commitSha, pass 판정, 확인 가능한 증빙 경로, approverId, approverRole을 기록한다.
      추적 파일 verification/approvers.json은 {"productOwner":["cheng80"]}을
      포함한다. verify:evidence는 approverRole이 productOwner이고 approverId가 해당
      배열에 있으며 현재 manifest와 나머지 필드가 일치할 때만 승인 기록을 유효하게 본다.
    invincibility_regression: >-
      무적 중 네 피해원에 각각 접촉해도 하트·공·패들이 초기화되지 않고, 무적 종료
      후 한 피해원에서 하트가 1 감소해 중앙 패들·공 1개·2초 면제가 시작되며 면제
      중 추가 접촉에서 하트가 감소하지 않는 절차를 세 환경 모두 수행한다.

evaluation_principles:
  - {name: 규칙 정확성, weight: 0.35, description: 충돌·생명·아이템·클리어·점수·초기화 규칙 일치}
  - {name: 조작성과 레이아웃, weight: 0.20, description: 세 입력 방식과 모바일 화면의 가림·잘림·스크롤 없음}
  - {name: 스테이지 차별성, weight: 0.15, description: 5개 스테이지의 정량 차별화와 후반 변칙 행동}
  - {name: 결정론과 검증성, weight: 0.15, description: 고정 tick의 반복 재현과 자동 검증}
  - {name: 호환성과 증빙, weight: 0.15, description: 대표 세 환경의 필수 시나리오와 유효 증빙}

exit_conditions:
  - name: 최종 승인
    description: 모든 자동·수동 검증과 사용자 승인이 완료된다.
    criteria: >-
      npm run verify:prepare와 수동 gate 완료 후 npm run verify:finalize가 각각
      제한 시간 안에 종료 코드 0이고, 대표 3개 환경의
      8개 기능군 모든 필수 행에서 expected와 actual이 일치하며 유효한 증빙과
      사용자(기획 책임자)의 승인 기록이 있다.
  - name: 승인 실패
    description: 필수 검증이나 승인 조건 중 하나라도 충족되지 않는다.
    criteria: >-
      자동 검증 실패·시간 초과, 필수 행 미실행·불일치, 증빙 누락·손상·식별 불가,
      사용자 승인 누락 중 하나 이상이 있다.

