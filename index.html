<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236c7cff'/%3E%3Ccircle cx='16' cy='21' r='4' fill='white'/%3E%3C/svg%3E" />
    <title>Swipe Breakout</title>
  </head>
  <body>
    <main class="app" aria-label="Swipe Breakout 게임">
      <header class="topbar">
        <div>
          <p class="eyebrow">SWIPE BREAKOUT</p>
          <h1>한 번에, 끝까지.</h1>
        </div>
        <button id="restart" class="icon-button" type="button" aria-label="게임 다시 시작">↻</button>
      </header>

      <section class="hud" aria-label="게임 현황">
        <div><span>STAGE</span><strong id="stage">1 / 5</strong></div>
        <div><span>SCORE</span><strong id="score">0</strong></div>
        <div><span>BALLS</span><strong id="balls">× 3</strong></div>
        <div><span>SHIELD</span><strong id="shield">OFF</strong></div>
      </section>

      <section class="game-shell">
        <div id="game-canvas" class="game-canvas" aria-label="벽돌깨기 게임판"></div>
        <div id="result" class="result" hidden>
          <p id="result-kicker">RUN OVER</p>
          <h2 id="result-title">다시 도전할까요?</h2>
          <p>최종 점수 <strong id="result-score">0</strong></p>
          <button id="result-restart" type="button">다시 시작</button>
        </div>
      </section>

      <footer class="control-copy">
        <span id="status-dot" aria-hidden="true"></span>
        <p id="status">아래에서 위로 드래그해 발사하세요</p>
        <kbd>SPACE</kbd>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
