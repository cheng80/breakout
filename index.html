<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236c7cff'/%3E%3Ccircle cx='16' cy='21' r='4' fill='white'/%3E%3C/svg%3E" />
    <title>Swipe Breakout</title>
  </head>
  <body>
    <main class="app" aria-label="Swipe Breakout 게임">
      <header class="topbar">
        <h1 class="brand-title">SWIPE BREAKOUT</h1>
        <div class="top-actions">
          <button id="help" class="icon-button" type="button" aria-label="아이템 설명 보기" aria-controls="item-help" aria-expanded="false">?</button>
          <button id="restart" class="icon-button" type="button" aria-label="게임 다시 시작">↻</button>
        </div>
      </header>

      <section class="hud" aria-label="게임 현황">
        <div class="stat stat-level"><span>레벨</span><strong id="stage">01</strong></div>
        <div class="stat"><span>점수</span><strong id="score">0</strong></div>
        <div class="stat stat-balls"><span>공</span><strong id="balls">× 1</strong></div>
        <div class="stat stat-shield"><span>보호막</span><strong id="shield">OFF</strong></div>
      </section>

      <section class="game-shell">
        <div id="game-canvas" class="game-canvas" aria-label="벽돌깨기 게임판"></div>
        <section id="item-help" class="item-help" role="dialog" aria-modal="true" aria-labelledby="item-help-title" hidden>
          <div class="item-help-card">
            <p>PAUSED</p>
            <h2 id="item-help-title">아이템과 특수 블록</h2>
            <ul class="item-help-list">
              <li><b class="legend-multiball">+1</b><span><strong>공 추가</strong>다음 발사부터 공이 하나 늘어납니다.</span></li>
              <li><b class="legend-bomb">B</b><span><strong>폭탄</strong>주변 블록에 피해를 줍니다.</span></li>
              <li><b class="legend-power">P</b><span><strong>강화볼</strong>다음 발사까지 공격력이 2배가 됩니다.</span></li>
              <li><b class="legend-shield">S</b><span><strong>보호막</strong>위험선 아래 진입을 한 번 막습니다.</span></li>
              <li><b class="legend-laser">↔</b><span><strong>레이저 블록</strong>파괴하면 같은 가로줄을 제거합니다.</span></li>
              <li><b class="legend-steel">◆</b><span><strong>강철 블록</strong>공만 반사하며 위험선 아래에서 사라집니다.</span></li>
            </ul>
            <button id="item-help-close" type="button">게임 계속하기</button>
          </div>
        </section>
        <div id="result" class="result" hidden>
          <p>RUN OVER</p>
          <h2>다시 조준해볼까요?</h2>
          <p>최종 점수 <strong id="result-score">0</strong></p>
          <button id="result-restart" type="button">다시 시작</button>
        </div>
      </section>

      <footer class="control-panel">
        <div class="control-status">
          <span id="status-dot" aria-hidden="true"></span>
          <p id="status" aria-live="polite">공의 방향을 정하고 발사 하세요.</p>
        </div>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
